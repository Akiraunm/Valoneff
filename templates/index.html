<!DOCTYPE html>
<html>
<head>
    <title>Valoneff</title>

    <style>
        body {
            background-color: #700000;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        header {
            background-color: #8c0000;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .menu button {
            margin-left: 10px;
            padding: 8px 15px;
            background: #400000;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 8px;
        }

        .menu button:hover {
            background: #b64040;
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: #000000;
            padding: 30px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 600px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .role {
            color: #38bdf8;
        }

        .abilities {
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">Valoneff</div>
    <div class="menu" id="menu"></div>


    <div class="menu">
        <button onclick="loadAgents()">Agents</button>
        <button onclick="loadMaps()">Maps</button>
        <button onclick="loadUpdates()">Updates</button>

        <button onclick="goLogin()">Login</button>
        <button onclick="goRegister()">Register</button>
    </div>
</header>


<div class="container" id="content"></div>

<script>
function renderMenu() {
    let user = localStorage.getItem("user");
    let menu = document.getElementById("menu");

    if (user) {
        menu.innerHTML = `
            <span>👤 ${user}</span>
        `;
    } 
}
// Agents
function loadAgents() {
    fetch("/agents")
    .then(res => res.json())
    .then(data => {
        let html = "";

        data.forEach(agent => {
            let name = agent.name.toLowerCase();
            let img = "/static/" + name + ".avif";

            html += `
                <div class="card">
                    <img src="${img}">
                    <h2>${agent.name}</h2>
                    <p class="role">${agent.role}</p>
                    <p class="abilities">${agent.abilities.join(", ")}</p>
                </div>
            `;
        });

        document.getElementById("content").innerHTML = html;
    });
}


// Maps
function loadMaps() {
    fetch("/maps")
    .then(res => res.json())
    .then(data => {
        let html = "";

        data.forEach(map => {
            html += `
                <div class="card">
                    <h2>${map.name}</h2>
                </div>
            `;
        });

        document.getElementById("content").innerHTML = html;
    });
}


// Updates
function loadUpdates() {
    fetch("/updates")
    .then(res => res.json())
    .then(data => {
        let html = "";

        data.forEach(update => {

            let name = update.agent.toLowerCase();
            let img = "/static/" + name + ".avif";

            html += `
                <div class="card">
                    <img src="${img}">
                    <h2>${update.agent}</h2>
                    <p>${update.change}</p>
                </div>
            `;
        });

        document.getElementById("content").innerHTML = html;
    });
}

function goLogin() {
    window.location.href = "/login-page";
}

function goRegister() {
    window.location.href = "/register-page";
}


function logout() {
    localStorage.removeItem("user");
    location.reload();
}

function goLogin() {
    window.location.href = "/login-page";
}

function goRegister() {
    window.location.href = "/register-page";
}

renderMenu();
loadAgents();

</script>

</body>
</html>
