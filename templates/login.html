<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        header {
            background-color: #020617;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .menu button {
            margin-left: 10px;
            padding: 8px 15px;
            background: #1e293b;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 8px;
        }

        .menu button:hover {
            background: #334155;
        }

        .active {
            background: #38bdf8;
            color: black;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px);
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
        }

        .btn {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #38bdf8;
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">🎮 Valoneff</div>

    <div class="menu" id="menu"></div>
</header>

<div class="center">
    <div class="box">
        <h2>Вход</h2>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button class="btn" onclick="login()">Войти</button>

        <div class="msg" id="msg"></div>
    </div>
</div>

<script>

// 🔄 динамическое меню
function renderMenu() {
    let user = localStorage.getItem("user");
    let menu = document.getElementById("menu");

    if (user) {
        menu.innerHTML = `
            <button onclick="goHome()">Home</button>
            <span>👤 ${user}</span>
            <button onclick="logout()">Logout</button>
        `;
    } else {
        menu.innerHTML = `
            <button onclick="goHome()">Home</button>
            <button class="active">Login</button>
            <button onclick="goRegister()">Register</button>
        `;
    }
}

// 🔁 переходы
function goHome() {
    window.location.href = "/";
}

function goRegister() {
    window.location.href = "/register-page";
}

// 🔐 логин
function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.message) {
            // 🔥 сохраняем пользователя
            localStorage.setItem("user", email);

            // редирект на главную
            window.location.href = "/";
        } else {
            document.getElementById("msg").innerText = data.error;
        }
    });
}

// 🚪 выход
function logout() {
    localStorage.removeItem("user");
    location.reload();
}

// запуск
renderMenu();

</script>

</body>
</html>
