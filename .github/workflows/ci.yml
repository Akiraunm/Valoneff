name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Клонирование
      uses: actions/checkout@v3

    - name: Установка Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Установка зависимостей
      run: |
        pip install flask pymongo bcrypt pytest

    - name: Запуск тестов
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest
